# Sample batch for demo and offline evaluation (see eval/README.md).
# Company names drive heuristic discovery: normalized slug -> {slug}.com / {slug}.io probes.
# optional_domain_hint documents which host the mock is aligned with for this sample set.

run:
  correlation_id: eval-sample-run

companies:
  - name: "Eval Full Co"
    optional_domain_hint: "evalfullco.com"
    notes: "Rich mocked HTML + full AI payload; expect COMPLETED with mid/high quality."

  - name: "Eval Thin Co"
    optional_domain_hint: "evalthinco.com"
    notes: "Thin mocked homepage text; lower evidence_strength; still completes if scrape has pages."

  - name: "Eval NoSite ZZZ"
    optional_domain_hint: null
    notes: "All discovery probes fail in the mock; expect PARTIAL (no website)."
